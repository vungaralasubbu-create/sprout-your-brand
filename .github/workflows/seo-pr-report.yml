name: SEO PR report

on:
  pull_request:
    paths:
      - "public/robots.txt"
      - "src/routes/**"
      - "scripts/seo-check.mjs"
      - ".github/workflows/seo-pr-report.yml"

# Needed for the bot to comment on the PR.
permissions:
  contents: read
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch base + head so we can diff.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 1. robots.txt diff ─────────────────────────────────────
      - name: Diff public/robots.txt
        id: robots
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          {
            echo 'diff<<__END__'
            git diff --no-color "$BASE" "$HEAD" -- public/robots.txt || true
            echo '__END__'
          } >> "$GITHUB_OUTPUT"

      # ── 2. sitemap source diff ─────────────────────────────────
      # The sitemap is generated by a server route; diff its source
      # file (the entries array + BASE_URL live there).
      - name: Diff sitemap route
        id: sitemap
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          {
            echo 'diff<<__END__'
            git diff --no-color "$BASE" "$HEAD" -- 'src/routes/sitemap[.]xml.ts' || true
            echo '__END__'
          } >> "$GITHUB_OUTPUT"

      # ── 3. noindex audit on the head commit ────────────────────
      - name: Run SEO check (captures noindex violations)
        id: seo
        continue-on-error: true
        run: |
          set +e
          node scripts/seo-check.mjs > seo-check.log 2>&1
          echo "exit=$?" >> "$GITHUB_OUTPUT"
          {
            echo 'log<<__END__'
            cat seo-check.log
            echo '__END__'
            echo 'violations<<__END__'
            grep -E 'public route src/routes/.* sets noindex' seo-check.log || true
            echo '__END__'
          } >> "$GITHUB_OUTPUT"

      # ── 4. Compose and upsert the PR comment ───────────────────
      - name: Upsert PR comment
        uses: actions/github-script@v7
        env:
          ROBOTS_DIFF: ${{ steps.robots.outputs.diff }}
          SITEMAP_DIFF: ${{ steps.sitemap.outputs.diff }}
          SEO_LOG: ${{ steps.seo.outputs.log }}
          SEO_VIOLATIONS: ${{ steps.seo.outputs.violations }}
          SEO_EXIT: ${{ steps.seo.outputs.exit }}
        with:
          script: |
            const marker = '<!-- lovable:seo-pr-report -->';
            const robots = process.env.ROBOTS_DIFF?.trim();
            const sitemap = process.env.SITEMAP_DIFF?.trim();
            const violations = process.env.SEO_VIOLATIONS?.trim();
            const log = process.env.SEO_LOG?.trim();
            const failed = process.env.SEO_EXIT !== '0';

            const block = (title, body, lang = '') =>
              body
                ? `### ${title}\n\n\`\`\`${lang}\n${body}\n\`\`\`\n`
                : `### ${title}\n\n_No changes._\n`;

            let violationsSection;
            if (violations) {
              const rows = violations
                .split('\n')
                .map(l => l.match(/src\/routes\/(\S+)/))
                .filter(Boolean)
                .map(m => `- \`src/routes/${m[1]}\``);
              violationsSection =
                `### ❌ noindex violations on public routes\n\n` +
                `These files set \`noindex\` but are not in the ` +
                `\`ALLOWED_NOINDEX\` allowlist in ` +
                `\`scripts/seo-check.mjs\`. Remove the tag or add the ` +
                `file to the allowlist with justification.\n\n` +
                rows.join('\n') + '\n';
            } else {
              violationsSection = `### ✅ noindex audit\n\nNo unexpected \`noindex\` on public routes.\n`;
            }

            const body = [
              marker,
              `## SEO PR report`,
              failed
                ? `**Status:** ❌ \`scripts/seo-check.mjs\` failed (exit ${process.env.SEO_EXIT}).`
                : `**Status:** ✅ \`scripts/seo-check.mjs\` passed.`,
              violationsSection,
              block('`public/robots.txt` diff', robots, 'diff'),
              block('`src/routes/sitemap[.]xml.ts` diff', sitemap, 'diff'),
              `<details><summary>Full SEO check log</summary>\n\n\`\`\`\n${log || '(empty)'}\n\`\`\`\n</details>`,
            ].join('\n\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            if (failed) core.setFailed('SEO check reported violations — see PR comment.');
